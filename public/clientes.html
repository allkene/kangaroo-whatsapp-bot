<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kangaroo Multiservice — CRM Clientes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:       #FF6600;
      --orange-dark:  #CC5200;
      --orange-bg:    #FFF4EE;
      --bg:           #F5F5F5;
      --surface:      #FFFFFF;
      --border:       #E8E0D8;
      --text:         #1A1A1A;
      --text-muted:   #6B6B6B;
      --green:        #22C55E;
      --radius:       12px;
      --shadow:       0 2px 8px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--orange);
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(204,82,0,0.3);
    }

    .logo { display: flex; align-items: center; gap: 12px; color: #fff; }
    .logo-icon { font-size: 32px; line-height: 1; }
    .logo-text h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .logo-text p  { font-size: 12px; opacity: 0.85; }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .back-link:hover { background: rgba(255,255,255,0.28); }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    /* ── Stats ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--border);
    }

    .stat-card:nth-child(1) { border-left-color: var(--orange); }
    .stat-card:nth-child(2) { border-left-color: var(--green); }
    .stat-card:nth-child(3) { border-left-color: #6366F1; }

    .stat-number {
      display: block;
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      color: var(--orange);
    }
    .stat-card:nth-child(2) .stat-number { color: var(--green); }
    .stat-card:nth-child(3) .stat-number { color: #6366F1; }

    .stat-label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      align-items: center;
    }

    .search-input {
      flex: 1;
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--orange); }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    /* ── Table ── */
    .table-wrap {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    thead {
      background: var(--orange-bg);
      border-bottom: 2px solid var(--border);
    }

    th {
      padding: 13px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--orange-dark);
      white-space: nowrap;
    }

    td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }

    tr:hover td { background: #FFF9F5; }

    .td-phone {
      font-family: monospace;
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .td-name {
      font-weight: 600;
      min-width: 120px;
    }

    .td-address {
      color: var(--text-muted);
      max-width: 200px;
    }

    .td-msg {
      color: var(--text-muted);
      max-width: 220px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .td-date { white-space: nowrap; color: var(--text-muted); font-size: 13px; }

    .badge-sessions {
      display: inline-block;
      background: var(--orange-bg);
      color: var(--orange);
      border: 1px solid #FDBA74;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .no-data {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state {
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 700px) {
      .stats-bar { grid-template-columns: 1fr; }
      .td-msg, .td-address { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">🦘</span>
      <div class="logo-text">
        <h1>Kangaroo Multiservice</h1>
        <p>CRM de Clientes</p>
      </div>
    </div>
    <a href="/dashboard" class="back-link">← Volver al Monitor</a>
  </header>

  <main>
    <div class="stats-bar">
      <div class="stat-card">
        <span class="stat-number" id="stat-total">0</span>
        <span class="stat-label">Total clientes</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="stat-named">0</span>
        <span class="stat-label">Con nombre</span>
      </div>
      <div class="stat-card">
        <span class="stat-number" id="stat-addressed">0</span>
        <span class="stat-label">Con dirección</span>
      </div>
    </div>

    <div class="toolbar">
      <input class="search-input" id="search" type="text" placeholder="🔍  Buscar por nombre o teléfono…" />
    </div>

    <p class="section-title" id="section-label">Cargando…</p>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Teléfono</th>
            <th>Nombre</th>
            <th>Dirección</th>
            <th>Último mensaje</th>
            <th>Fecha registro</th>
            <th>Contactos</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="6" class="no-data" style="padding:40px">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script>
    let allClientes = [];

    function escHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function formatDate(ts) {
      if (!ts) return "—";
      return new Date(ts).toLocaleDateString("es-DO", {
        day: "2-digit", month: "short", year: "numeric"
      });
    }

    function truncate(str, n) {
      if (!str) return "—";
      return str.length > n ? str.slice(0, n) + "…" : str;
    }

    function renderTable() {
      const search = document.getElementById("search").value.toLowerCase();
      const tbody  = document.getElementById("table-body");
      const label  = document.getElementById("section-label");

      const filtered = allClientes.filter(c => {
        const nameMatch  = (c.customerName || "").toLowerCase().includes(search);
        const phoneMatch = c.phone.includes(search);
        return nameMatch || phoneMatch;
      });

      label.textContent = filtered.length === 1
        ? "1 cliente"
        : `${filtered.length} clientes`;

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6">
          <div class="empty-state">
            <div class="empty-icon">👥</div>
            <p>${search ? "No se encontraron clientes con esa búsqueda." : "Aún no hay clientes registrados."}</p>
          </div>
        </td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(c => `
        <tr>
          <td class="td-phone">+${escHtml(c.phone)}</td>
          <td class="td-name">${escHtml(c.customerName) || '<span style="color:#bbb">Sin nombre</span>'}</td>
          <td class="td-address">${escHtml(truncate(c.address, 50)) || '<span style="color:#bbb">—</span>'}</td>
          <td class="td-msg" title="${escHtml(c.lastUserMessage || "")}">${escHtml(truncate(c.lastUserMessage, 55)) || "—"}</td>
          <td class="td-date">${formatDate(c.firstMessageAt)}</td>
          <td><span class="badge-sessions">${c.totalSessions}</span></td>
        </tr>`).join("");
    }

    async function fetchClientes() {
      try {
        const res  = await fetch("/api/clientes");
        const data = await res.json();
        allClientes = data.clientes || [];

        document.getElementById("stat-total").textContent     = data.total;
        document.getElementById("stat-named").textContent     = allClientes.filter(c => c.customerName).length;
        document.getElementById("stat-addressed").textContent = allClientes.filter(c => c.address).length;

        renderTable();
      } catch (e) {
        console.error("Error cargando clientes:", e);
      }
    }

    document.getElementById("search").addEventListener("input", renderTable);

    fetchClientes();
    setInterval(fetchClientes, 30000);
  </script>

</body>
</html>
